name: release

on:
  workflow_dispatch:
    inputs:
      package_dir:
        description: "Directory containing the package.json to publish"
        required: false
        default: "."
      dry_run:
        description: "Run npm publish as a dry run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - name: Install, test, pack, and publish
        env:
          PACKAGE_DIR: ${{ github.event.inputs.package_dir || '.' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$PACKAGE_DIR"
          node -e "const p=require('./package.json'); console.log(`Publishing ${p.name}@${p.version} from ${process.cwd()}`)"
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build --if-present
          npm test --if-present
          npm pack --dry-run --json
          if [ "$DRY_RUN" = "true" ]; then
            npm publish --access public --provenance --dry-run
          else
            npm publish --access public --provenance
          fi
